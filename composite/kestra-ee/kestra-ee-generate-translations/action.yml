name: Generate Translations
description: "Required the environment variable OPENAI_API_KEY to be set. This action will generate translations for the UI."

inputs:
  github-token:
    description: 'GitHub Token'
    required: true
  retranslate_modified_keys:
    description: 'If true, will retranslate modified keys'
    required: false
    default: false

runs:
  using: composite

  steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref }}

    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version: "20.x"

    - name: Install Node dependencies
      run: npm ci
      shell: bash
      working-directory: ui-ee

    - name: Generate translations
      run: npm run translations:generate -- ${{ github.event.inputs.retranslate_modified_keys }}
      working-directory: ui-ee
      shell: bash

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: "20.x"

    - name: Check keys matching
      shell: bash
      run: npx --yes tsx ui-ee/src/translations/check.ts

    - name: Set up Git
      shell: bash
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "actions@github.com"

    - name: Check for changes and commit
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      shell: bash
      run: |
        git add ui-ee/src/translations/ee_translations/*.json
        if git diff --cached --quiet; then
          echo "No changes to commit. Exiting with success."
          exit 0
        fi
        git commit -m "chore(core): localize to languages other than english" -m "Extended localization support by adding translations for multiple languages using English as the base. This enhances accessibility and usability for non-English-speaking users while keeping English as the source reference."
        git push origin ${{ github.head_ref }}
