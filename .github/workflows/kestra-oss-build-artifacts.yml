name: Build Artifacts

on:
  workflow_call:
    inputs:
      java-version:
        description: "Java version"
        type: string
        default: '21'
        required: false

env:
  OTLP_ENDPOINT: ${{ secrets.OTLP_ENDPOINT }}

jobs:
  build:
    name: Build - Artifacts
    runs-on: ubuntu-latest
    outputs:
      docker-tag: ${{ steps.vars.outputs.tag }}
      docker-artifact-name: ${{ steps.vars.outputs.artifact }}
    env:
      PLUGIN_VERSION: ${{ github.event.inputs.plugin-version != null && github.event.inputs.plugin-version || 'LATEST' }}
    steps:
      - name: Checkout - Current ref
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Setup build
      - uses: kestra-io/actions/composite/setup-build@main
        name: Setup - Build
        id: build
        with:
          java-enabled: true
          node-enabled: true
          java-version: ${{ inputs.java-version }}

      - name: Setup - OpenTelemetry
        uses: kestra-io/actions/actions/otel-collect@main
        if: ${{ env.OTLP_ENDPOINT != '' }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          otlp-endpoint: ${{ secrets.OTLP_ENDPOINT }}
          otlp-headers: "${{ secrets.OTLP_HEADERS }}"
          host-metrics-enabled: 'true'
          gradle-tracing-enabled: 'true'
          service-name: "Github Actions - ${{ github.repository }} - ${{ github.workflow }}"

      # Npm
      - name: Setup - Npm install
        shell: bash
        working-directory: ui
        run: npm ci

      # Build
      - name: Gradle - Build
        shell: bash
        run: |
          ./gradlew executableJar

      - name: Artifacts - Copy exe to image
        shell: bash
        run: |
          cp build/executable/* docker/app/kestra && chmod +x docker/app/kestra

      # Upload artifacts
      - name: Artifacts - Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: jar
          path: build/libs/

      - name: Artifacts - Upload Executable
        uses: actions/upload-artifact@v4
        with:
          name: exe
          path: build/executable/

  otel-export-trace:
    if: always()
    name: OpenTelemetry Export Trace
    runs-on: ubuntu-latest
    needs: [ build ]
    steps:
      - name: OpenTelemetry - Export trace
        uses: kestra-io/actions/actions/otel-collect@main
        if: ${{ env.OTLP_ENDPOINT != '' }}
        with:
          mode: export-all
          github-token: ${{ secrets.GITHUB_TOKEN }}
          otlp-endpoint: ${{ secrets.OTLP_ENDPOINT }}
          otlp-headers: "${{ secrets.OTLP_HEADERS }}"
          logs-enabled: 'true'
          service-name: "Github Actions - ${{ github.repository }} - ${{ github.workflow }}"
