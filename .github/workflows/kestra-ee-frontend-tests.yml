name: Frontend tests

on:
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        description: "The Codecov token."
        required: false

env:
  OTLP_ENDPOINT: ${{ secrets.OTLP_ENDPOINT }}

jobs:
  check:
    name: Check
    runs-on: kestra-private-standard
    timeout-minutes: 60
    steps:
      # Checkout
      - name: Checkout - EE
        uses: actions/checkout@v5
        with:
          path: kestra-ee

      - name: Checkout - OSS
        uses: kestra-io/actions/composite/kestra-ee/kestra-ee-checkout@main

      - name: setup build
        uses: kestra-io/actions/composite/setup-build@main
        with:
          node-enabled: true
          node-version: '22.18.0'

      - name: Setup - OpenTelemetry
        uses: kestra-io/actions/actions/otel-collect@main
        if: ${{ env.OTLP_ENDPOINT != '' }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          otlp-endpoint: ${{ secrets.OTLP_ENDPOINT }}
          otlp-headers: "${{ secrets.OTLP_HEADERS }}"
          host-metrics-enabled: 'true'
          service-name: "Github Actions - ${{ github.repository }} - ${{ github.workflow }}"

      - name: Cache - OSS Node Modules
        id: cache-oss-node-modules
        uses: actions/cache@v4
        with:
          path: kestra/ui/node_modules
          key: modules-oss-${{ hashFiles('kestra/ui/package-lock.json') }}

      - name: Cache - EE Node Modules
        id: cache-ee-node-modules
        uses: actions/cache@v4
        with:
          path: kestra-ee/ui-ee/node_modules
          key: modules-ee-${{ hashFiles('kestra-ee/ui-ee/package-lock.json') }}

      - name: Cache - Playwright Binaries
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('kestra-ee/ui-ee/package-lock.json') }}

      # Hack npm install install from oss
      - name: Npm - Hack install from oss
        if: steps.cache-oss-node-modules.outputs.cache-hit != 'true'
        shell: bash
        run: |
          cd kestra/ui
          npm ci

      - name: Npm - Install
        if: steps.cache-ee-node-modules.outputs.cache-hit != 'true'
        shell: bash
        working-directory: kestra-ee/ui-ee
        run: npm ci

      - name: Npm - Check types
        shell: bash
        working-directory: kestra-ee/ui-ee
        run: npm run check:types

      - name: Npm - Lint (oxlint)
        shell: bash
        working-directory: kestra-ee/ui-ee
        run: npx oxlint@latest

      - name: Npm - Lint (eslint)
        uses: reviewdog/action-eslint@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          workdir: "kestra-ee/ui-ee"

      - name: Run front-end unit tests
        shell: bash
        working-directory: kestra-ee/ui-ee
        run: npm run test:unit -- --coverage

      - name: Storybook - Install Playwright
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        shell: bash
        working-directory: kestra-ee/ui-ee
        run: npx playwright install --with-deps

      - name: Run Storybook component tests
        shell: bash
        working-directory: kestra-ee/ui-ee
        run: npm run test:storybook -- --coverage
