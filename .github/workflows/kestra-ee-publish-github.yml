name: Github - Release

on:
  workflow_call:
    secrets:
      GH_BOT_APP_ID:
        description: "GitHub App Client ID."
        required: true
      GH_BOT_PRIVATE_KEY:
        description: "GitHub App private key."
        required: true
      SLACK_RELEASES_WEBHOOK_URL:
        description: "The Slack webhook URL."
        required: true

env:
  OTLP_ENDPOINT: ${{ secrets.OTLP_ENDPOINT }}

jobs:
  release:
    name: Github - Release
    runs-on: kestra-private-standard
    # skip RCs
    if: ${{ !contains(github.ref, '-rc') }}
    steps:
      # Check out
      - name: Checkout - Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: true

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_BOT_APP_ID }}
          private-key: ${{ secrets.GH_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }},docs

      # Download Exec
      # Must be done after checkout actions
      - name: Artifacts - Download executable
        uses: actions/download-artifact@v5
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: exe
          path: build/executable

      - name: Check if current tag is latest
        id: is_latest
        run: |
          latest_tag=$(git tag | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed 's/^v//' | sort -V | tail -n1)
          current_tag="${GITHUB_REF_NAME#v}"
          if [ "$current_tag" = "$latest_tag" ]; then
          echo "latest=true" >> $GITHUB_OUTPUT
          else
          echo "latest=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      # Push API Reference to website
      - name: Push API Reference to website
        uses: kestra-io/actions/composite/publish-api-reference@main
        if: ${{ steps.is_latest.outputs.latest == 'true' }}
        with:
          gh-app-id: ${{ secrets.GH_BOT_APP_ID }}
          gh-app-private-key: ${{ secrets.GH_BOT_PRIVATE_KEY }}

      # GitHub Release
      - name: Create GitHub release
        uses: kestra-io/actions/composite/github-release@main
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        with:
          announce-slack: 'false'
        env:
          MAKE_LATEST: ${{ steps.is_latest.outputs.latest }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_RELEASES_WEBHOOK_URL: ${{ secrets.SLACK_RELEASES_WEBHOOK_URL }}

      - name: Merge Release Notes
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: kestra-io/actions/composite/github-release-note-merge@main
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_TAG: ${{ github.ref_name }}

  otel-export-trace:
    if: always()
    name: OpenTelemetry Export Trace
    runs-on: kestra-private-standard
    needs: [ release ]
    steps:
      - name: OpenTelemetry - Export trace
        uses: kestra-io/actions/actions/otel-collect@main
        if: ${{ env.OTLP_ENDPOINT != '' }}
        with:
          mode: export-all
          github-token: ${{ secrets.GITHUB_TOKEN }}
          otlp-endpoint: ${{ secrets.OTLP_ENDPOINT }}
          otlp-headers: "${{ secrets.OTLP_HEADERS }}"
          logs-enabled: 'true'
          service-name: "Github Actions - ${{ github.repository }} - ${{ github.workflow }}"
